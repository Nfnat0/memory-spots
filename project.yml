name: MindPalace
options:
  bundleIdPrefix: com.nf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"
settings:
  base:
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    DEVELOPMENT_TEAM: 3Z2GBKFGF5
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  MindPalace:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MindPalace
    resources:
      - MindPalace/Resources
    info:
      path: MindPalace/Info.plist
      properties:
        CFBundleDisplayName: Mind Palace
        NSCameraUsageDescription: Mind Palace uses the camera to add place photos to memory sets.
        NSLocationWhenInUseUsageDescription: Mind Palace can attach your current location to newly captured place photos.
        NSPhotoLibraryUsageDescription: Mind Palace can read photo location metadata when you add place photos from your library.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  MindPalaceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MindPalaceTests
    dependencies:
      - target: MindPalace
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MindPalace:
    build:
      targets:
        MindPalace: all
    test:
      targets:
        - MindPalaceTests
